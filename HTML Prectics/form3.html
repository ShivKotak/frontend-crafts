<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Marketing Client Intake Form</title>
    <style>
        body {
            background-color: rgb(255, 226, 192);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            padding-top: 50px;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        form {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: rgb(247, 244, 244);
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .form-row {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
        }
        input[type="text"], input[type="email"], textarea, select {
            width: 100%;
            padding: 10px;
            margin: 5px 0 15px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .row {
            display: flex;
            justify-content: space-between;
        }
        .row input[type="text"] {
            width: 48%;
        }
        textarea {
            height: 100px;
            resize: vertical;
        }
        .buttons {
            text-align: center;
        }
        input[type="submit"], input[type="reset"] {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        input[type="submit"] {
            background-color: #4CAF50;
            color: #fff;
        }
        input[type="reset"] {
            background-color: #f44336;
            color: #fff;
        }
    </style>
</head>
<body>
    <form>
        <h1>Social Media Marketing Client Intake Form</h1>

        <!-- New Fields -->
        <div class="form-row">
            <label for="first-name">First Name</label>
            <input type="text" id="first-name" name="first-name" required>
        </div>
        <div class="form-row">
            <label for="last-name">Last Name</label>
            <input type="text" id="last-name" name="last-name" required>
        </div>
        <div class="form-row">
            <label for="personal-email">Personal Email</label>
            <input type="email" id="personal-email" name="personal-email" required>
        </div>

        <!-- Original Fields -->
        <div class="form-row">
            <label for="business-name">Business Name</label>
            <input type="text" id="business-name" name="business-name" required>
        </div>
        <div class="form-row">
            <label for="business-email">Business Email</label>
            <input type="email" id="business-email" name="business-email" placeholder="example@example.com" required>
        </div>
        <div class="form-row">
            <label for="business-phone">Business Phone Number</label>
            <input type="text" id="business-phone" name="business-phone" placeholder="(000-000-0000)" required>
        </div>
        <div class="form-row">
            <label for="business-address">Business Address</label>
            <input type="text" id="business-address" name="business-address" placeholder="Street Address" required>
        </div>
        <div class="row">
            <div>
                <label for="city">City</label>
                <input type="text" id="city" name="city" required>
            </div>
            <div>
                <label for="state">State / Province</label>
                <input type="text" id="state" name="state" required>
            </div>
        </div>
        <div class="form-row">
            <label for="postal-code">Postal / Zip Code</label>
            <input type="text" id="postal-code" name="postal-code" required>
        </div>
        <div class="form-row">
            <label for="business-categories">Please supply all of your business categories.</label>
            <textarea id="business-categories" name="business-categories" required></textarea>
        </div>
        <div class="form-row">
            <label for="target-audience">What is your target audience?</label>
            <textarea id="target-audience" name="target-audience" required></textarea>
        </div>
        <div class="buttons">
            <input type="reset" value="Reset">
            <input type="submit" value="Submit">
        </div>
    </form>
</body>
</html>
