<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Form</title>
    <style>
        body {
            background-color: pink;
            font-family: Arial, sans-serif;
        }

        fieldset {
            border: 2px solid #333;
            padding: 20px;
            border-radius: 10px;
            background-color: #fff;
            max-width: 600px;
            margin: auto;
        }

        legend {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        label {
            display: block;
            margin: 10px 0 5px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        textarea {
            width: calc(100% - 22px);
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        textarea {
            resize: vertical;
        }

        input[type="checkbox"],
        input[type="radio"] {
            margin-right: 5px;
        }

        select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .form-row {
            margin-bottom: 15px;
        }

        input[type="submit"],
        input[type="reset"] {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
        }

        input[type="reset"] {
            background-color: #f44336;
        }

        input[type="submit"]:hover,
        input[type="reset"]:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <form action="/action.html">
        <fieldset>
            <legend>
                Employee Details
            </legend>
            <div class="form-row">
                <label for="fname">First Name:</label>
                <input type="text" name="fname" id="fname" placeholder="First name" required>
            </div>
            <div class="form-row">
                <label for="lname">Last Name:</label>
                <input type="text" name="lname" id="lname" placeholder="Last name" required>
            </div>
            <div class="form-row">
                <label for="email">Email:</label>
                <input type="email" name="email" id="email" placeholder="Email" required>
            </div>
            <div class="form-row">
                <label for="phone">Phone:</label>
                <input type="tel" name="phone" id="phone" placeholder="Enter phone number" required>
            </div>
            <div class="form-row">
                <label for="address">Address:</label>
                <textarea name="address" id="address" rows="3" placeholder="Address"></textarea>
            </div>
            <div class="form-row">
                <label>Hobbies:</label>
                <input type="checkbox" value="reading" name="hobby" id="hobby-reading"> <label
                    for="hobby-reading">Reading</label>
                <input type="checkbox" value="writing" name="hobby" id="hobby-writing"> <label
                    for="hobby-writing">Writing</label>
                <input type="checkbox" value="swimming" name="hobby" id="hobby-swimming"> <label
                    for="hobby-swimming">Swimming</label>
                <input type="checkbox" value="dancing" name="hobby" id="hobby-dancing"> <label
                    for="hobby-dancing">Dancing</label>
            </div>
            <div class="form-row">
                <label for="city">City:</label>
                <select name="city" id="city">
                    <option value="Ahmedabad">Ahmedabad</option>
                    <option value="Vadodara">Vadodara</option>
                    <option value="Rajkot">Rajkot</option>
                    <option value="Surat">Surat</option>
                    <option value="Patan">Patan</option>
                    <option value="Jamnagar">Jamnagar</option>
                    <option value="Junagadh">Junagadh</option>
                    <option value="Porbandar">Porbandar</option>
                    <option value="Bhuj">Bhuj</option>
                    <option value="Morbi">Morbi</option>
                    <option value="Bhavnagar">Bhavnagar</option>
                    <option value="Gandhinagar">Gandhinagar</option>
                    <option value="Mehsana">Mehsana</option>
                </select>
            </div>
            <div class="form-row">
                <label>Gender:</label>
                <input type="radio" value="male" name="gender" id="gender-male"> <label for="gender-male">Male</label>
                <input type="radio" value="female" name="gender" id="gender-female"> <label
                    for="gender-female">Female</label>
            </div>
            <div class="form-row">
                <input type="submit" value="Submit">
                <input type="reset" value="Reset">
            </div>
        </fieldset>
    </form>
</body>

</html>
