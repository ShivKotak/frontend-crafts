<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box Properties</title>
    <style>
      *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .box{
        height: 75px;
        width: 75px;
        border: 2px solid black;
        margin: 5px;
      }
      h1{
        text-align: center;
        color: blue;
      }
      #container{
        height: 600px;
        width: 600px;
        padding: 10px;
        margin: 20px;
        border: 3px solid black;
        background-color: rgb(248, 255, 255);
        display: flex;
        flex-direction: row;
        justify-content: center;
        flex-wrap: wrap;
        align-items: center;
        align-content: center;
      }
        #box1{
        background-color: red;
        order: 3;
        }
        #box2{
            background-color: green;
            flex-shrink: 1; /* This will allow box2 to shrink if necessary */
            order: 1;
        }
        #box3{
            background-color: blue;
            order: 4;
        }
        #box4{
            background-color: yellow;
            order: 2;
        }
    </style>
</head>
<body>
    <h1>Flex container</h1>
    <div id="container">
        <div id="box1" class="box">Flex Item 1</div>
        <div id="box2" class="box">Flex Item 2</div>
        <div id="box3" class="box">Flex Item 3</div>
        <div id="box4" class="box">Flex Item 4</div>
    </div>
</body>
</html>
