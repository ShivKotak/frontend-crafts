<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animation,transition</title>
    <style>
        .box{
            height: 50px;
            width: 50px;
            margin: 20px;
            background-color: red;
            padding: 10px;
            border: 3px solid black;
            border-radius: 20px;
            transition: all 1s ease-in 0s;
        }
        #box1:hover {
            transform: rotate(180deg);
        }
        
        #box2:hover {
            transform: scale(1.5);
            background-color: blue;
            color: white;
        }
        #box3:hover {
            transform: translate(100px, 50px);
            background-color: yellow;
            color: black;
        }
        #box4:hover {
            transform: skew(45deg);
            background-color: purple;
            color: white;
        }
        #animation{
            height: 50px;
            width: 50px;
            margin: 20px;
            background-color: rgb(148, 229, 50);
            padding: 10px;
            border: 3px solid black;
            border-radius: 20px;
            position: relative;
            animation-name: lefinder;
            animation-duration: 2s;
            animation-timing-function: ease-in-out;
            animation-delay: 1s;
            animation-iteration-count: infinite;
            animation-direction: alternate;
            animation-fill-mode: forwards;
        }
        @keyframes lefinder {
            /* from{
                left: 10px;
            }
            to{
                left: 200px;
            } */
             0% {
                left: 10px;
             }
             50% {
                left: 200px;
                background-color: blue;
                transform: rotate(180deg);
             }
                100% {
                    left: 10px;
                    background-color: red;
                    transform: rotate(0deg);
                }
        }
        @media screen and (max-width:400px) {
            #box {
                background-color: green;
                width: 200px;
                height: 200px;
            }
        }
        .Pseudo {
            background-color: green;
            color: white;
            padding: 10px;
            border: 3px solid black;
            border-radius: 20px;
            transition-property: all;
            transition-duration: 0.5s;
            transition-timing-function: ease-in-out;
            transition-delay: 0s;
            transition: all 0.5s ease-in-out 0s;
            cursor: pointer;
        }
        .Pseudo:hover {
            height: 50px;
            width: 120px;
            background-color: blue;
            color: yellow;
        }
        .Pseudo:active {
            background-color: red;
            color: black;
        }
        .Pseudo:focus {
            outline: 2px solid orange;
        }
        /* .Pseudo::before {
            content: "Before ";
            color: white;
        }
        .Pseudo::after {
            content: " After";
            color: white;
        }  */
    </style>
</head>
<body>
    <div id="box1" class="box">rotate</div>
    <div id="box2" class="box">scale</div>
    <div id="box3" class="box">translate</div>
    <div id="box4" class="box">skew</div>
    <div id="animation">animate</div>
    <button type="button" class="Pseudo">Learning Pseudo</button>
</body>
</html>
