<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link States Example</title>
    <style>
        /* Unvisited link */
        a:link {
            color: #FF0000; /* Red */
        }

        /* Visited link */
        a:visited {
            color: #00FF00; /* Green */
        }

        /* Link when hovered over */
        a:hover {
            color: #FF00FF; /* Magenta */
        }

        /* Link when clicked (active) */
        a:active {
            color: #0000FF; /* Blue */
        }
    </style>
</head>
<body>

    <h1>Link States in Action</h1>

    <p>
        This is an example of different link states in CSS:
    </p>

    <ul>
        <li><a href="https://example.com" target="_blank">Example Link 1</a></li>
        <li><a href="https://example.org" target="_blank">Example Link 2</a></li>
    </ul>

</body>
</html>
