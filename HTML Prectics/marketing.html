<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Marketing Client Intake Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f7ff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            padding-top: 50px;
        }
        .form-container {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 600px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
        }
        input[type="text"], input[type="email"], textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .hint {
            color: #888;
            font-size: 0.9em;
            margin-top: -15px;
            margin-bottom: 20px;
        }
        .row {
            display: flex;
            justify-content: space-between;
        }
        .row input[type="text"] {
            width: 48%;
        }
        textarea {
            height: 100px;
            resize: vertical;
        }
        .button-group {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button[type="submit"] {
            background-color: #4CAF50;
            color: white;
        }
        button[type="reset"] {
            background-color: #f44336;
            color: white;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Social Media Marketing Client Intake Form</h1>
        <form>
            <label for="business-name">Business Name</label>
            <input type="text" id="business-name" name="business-name" required>

            <label for="business-email">Business Email</label>
            <input type="email" id="business-email" name="business-email" required>
            <div class="hint">example@example.com</div>

            <label for="business-phone">Business Phone Number</label>
            <input type="text" id="business-phone" name="business-phone" placeholder="(000) 000-0000" required>
            <div class="hint">Please enter a valid phone number.</div>

            <label for="business-address">Business Address</label>
            <input type="text" id="business-address" name="business-address" placeholder="Street Address" required>

            <div class="row">
                <div>
                    <label for="city">City</label>
                    <input type="text" id="city" name="city" required>
                </div>
                <div>
                    <label for="state">State / Province</label>
                    <input type="text" id="state" name="state" required>
                </div>
            </div>

            <label for="postal-code">Postal / Zip Code</label>
            <input type="text" id="postal-code" name="postal-code" required>

            <label for="business-categories">Please supply all of your business categories.</label>
            <textarea id="business-categories" name="business-categories" placeholder="Type here..." required></textarea>

            <div class="row">
                <div>
                    <label for="facebook">Do you have a Facebook page for your business?</label>
                    <input type="text" id="facebook" name="facebook">
                </div>
                <div>
                    <label for="twitter">Do you have a Twitter page for your business?</label>
                    <input type="text" id="twitter" name="twitter">
                </div>
            </div>

            <div class="row">
                <div>
                    <label for="instagram">Do you have an Instagram page for your business?</label>
                    <input type="text" id="instagram" name="instagram">
                </div>
                <div>
                    <label for="google">Do you have a Google+ page for your business?</label>
                    <input type="text" id="google" name="google">
                </div>
            </div>

            <label for="target-audience">What is your target audience?</label>
            <textarea id="target-audience" name="target-audience" placeholder="Type here..." required></textarea>

            <div class="button-group">
                <button type="reset">Reset</button>
                <button type="submit">Submit</button>
            </div>
        </form>
    </div>
</body>
</html>
