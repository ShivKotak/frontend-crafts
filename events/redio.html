<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<script>
    function validate()
    {
    if(document.getElementbyId("m").checked==true)
    {
        document.getElementById("p1").innerHTML=document.getElementById("m").value
    }
    else if(document.getElementById("f").checked==true)
    {
        document.getElementById("p1").innerHTML=document.getElementById("f").value
    }
    else{
        alert("Please choose the gender");
    }
}
</script>
<body>
    <form>
       Gender : <input type="radio" id="m" value="male" name="gender"> Male
        <input type="radio" id="f" value="female" name="gender"> Female
        <input type="button" value="click me" onclick="validate()">
    </form>
    <p id="p1">

    </p>
</body>
</html>
