<html>

<body>
	<script type='text/javascript'>
		function MatchPassword() {
			var p1 = document.f1.pw1.value;
			var p2 = document.f1.pw2.value;
			if (p1 == p2) {
				if (p1.length >= 5 && p1.length <= 10) {
					if (isNaN(p1)) {
						alert("password match and length is correct and its only alphabet");
					}
					else {
						alert("only alphabet allowed")
						document.f1.pw1.focus();
					}
				}
				else {
					alert("password length is not between 5 to 10");
					document.f1.pw1.focus();
				}
			}
			else {

				alert("password not match");
				document.f1.pw1.focus();
			}
		}

	</script>
	<form name="f1">
		Enter password :<input type="text" id='txtBox2' name="pw1" /><br><Br>
		confirm password :<input type="text" id='txtBox2' name="pw2" /><br><Br>
		<input type="button" onclick="MatchPassword()" value="Validate Password" />
	</form>
</body>

</html>
