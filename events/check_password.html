Password match

<html>

<body>
	<script type='text/javascript'>
		function MatchPassword() {
			var p1 = document.f1.pw1.value;
			var p2 = document.f1.pw2.value;
			if (p1 == p2) {
				alert("password match");
			}
			else {

				alert("password not match");
			}
		}

	</script>
	<form name="f1">
		Enter password :<input type="password" id='txtBox2' name="pw1" /><br><Br>
		confirm password :<input type="password" id='txtBox2' name="pw2" /><br><Br>
		<input type="button" onclick="MatchPassword()" value="Validate Password" />
	</form>
</body>

</html>
