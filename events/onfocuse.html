<!DOCTYPE html>
<html>
<body>

Enter your name: <input type="text" onfocus="myFunction(this)" onblur="normalFunction(this)">

<p>When the input field gets focus, a function is triggered which changes the background color.</p>

<script>
function myFunction(x) {
    x.style.background = "yellow";  // Change background color to yellow on focus
}

function normalFunction(x) {
    x.style.background = "";  // Reset background color when focus is lost
}
</script>

</body>
</html>
