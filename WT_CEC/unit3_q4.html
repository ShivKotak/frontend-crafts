<!DOCTYPE html>
<html >
<head>
    <title>Navigation Menu</title>
    <style>
      body {
    font-family: Arial, sans-serif;
}

.nav-menu {
    list-style-type: none;
    padding: 0;
    background-color: #333;
    height: 40px;
}

.nav-menu li {
    display: inline;
    margin-right: 20px;
}

.nav-menu a {
    text-decoration: none;
    color: white;
    padding: 10px 15px;
    transition: background-color 0.3s;
}

.nav-menu a:hover {
    color: #4CAF50;
}

.nav-menu a:visited {
    color: #ffcc00;
}

.nav-menu a:active {
    background-color: #555;
    color: white;
}

.content {
    padding: 20px;
}
  
    </style>
</head>
<body>

    <nav>
        <ul class="nav-menu">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <div class="content">
        <h2>Welcome to My Website</h2>
        <p>This is the homepage content</p>
    </div>


</body>
</html>
