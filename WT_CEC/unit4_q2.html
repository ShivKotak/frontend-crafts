<!DOCTYPE html>
<html>

<head>
    <title>Month name and Month days</title>
</head>

<body>
    <script>
        let monthNo = 1;

        if (monthNo == 1) {
            document.write("January and 31 days in this month");
        } else if (monthNo == 2) {
            document.write("February and 28 days in this month (29 in leap years)");
        } else if (monthNo == 3) {
            document.write("March and 31 days in this month");
        } else if (monthNo == 4) {
            document.write("April and 30 days in this month");
        } else if (monthNo == 5) {
            document.write("May and 31 days in this month");
        } else if (monthNo == 6) {
            document.write("June and 30 days in this month");
        } else if (monthNo == 7) {
            document.write("July and 31 days in this month");
        } else if (monthNo == 8) {
            document.write("August and 31 days in this month");
        } else if (monthNo == 9) {
            document.write("September and 30 days in this month");
        } else if (monthNo == 10) {
            document.write("October and 31 days in this month");
        } else if (monthNo == 11) {
            document.write("November and 30 days in this month");
        } else if (monthNo == 12) {
            document.write("December and 31 days in this month");
        } else {
            document.write("Invalid month number");
        }
        let monthnum = 5;
        switch (monthnum) {
            case 1:
                document.write("January and 31 days in this month");
                break;
            case 2:
                document.write("February and 28 days in this month (29 in leap years)");
                break;
            case 3:
                document.write("March and 31 days in this month");
                break;
            case 4:
                document.write("April and 30 days in this month");
                break;
            case 5:
                document.write("<br>May and 31 days in this month");
                break;
            case 6:
                document.write("June and 30 days in this month");
                break;
            case 7:
                document.write("July and 31 days in this month");
                break;
            case 8:
                document.write("August and 31 days in this month");
                break;
            case 9:
                document.write("September and 30 days in this month");
                break;
            case 10:
                document.write("October and 31 days in this month");
                break;
            case 11:
                document.write("November and 30 days in this month");
                break;
            case 12:
                document.write("December and 31 days in this month");
                break;
            default:
                document.write("invalid monthnumber");
                break;
        }
    </script>
</body>

</html>
