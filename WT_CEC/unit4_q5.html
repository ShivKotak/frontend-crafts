<!DOCTYPE html>
<html>
<head>
    <title>Confirm Dialog Example</title>
</head>
<body>
    <script>
        
        let Response = confirm("Do you want to continue?");
        if (Response) {
            document.write("Continued!");
        } else {
            document.write("Not Continued!");
        }
    </script>
</body>
</html>
