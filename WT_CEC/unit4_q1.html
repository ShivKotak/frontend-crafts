<!DOCTYPE html>
<html>
<head>
    <title>print days</title>
</head>
<body>
    <script>
        let day=1;
        if(day==1){
            document.write("Sunday");
        }
        else if (day==2) {
            document.write("Monday");
        }
        else if (day==3) {
            document.write("Tuesday");
        }
        else if (day==4) {
            document.write("Wednesday");
        }
        else if (day==5) {
            document.write("Thursday");
        }
        else if (day==6) {
            document.write("Friday");
        }
        else if (day==7) {
            document.write("Saturday");
        }
          
        let dayno=6;
        switch (dayno) {
                case 1:
                  document.write("Sunday")
                break;
                case 2:
                  document.write("Monday")
                break;
                case 3:
                  document.write("Tuesday")
                break;
                case 4:
                  document.write("Wednesday")
                break;
                case 5:
                  document.write("Thursday")
                break;
                case 6:
                  document.write("  friday")
                break;
                case 7:
                  document.write("Saturday")
                break;
            default:
            document.write("invalid  dayno")
                break;
        }
    </script>
    <br>
</body>
</html>
