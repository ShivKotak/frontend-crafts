<!DOCTYPE html>
<html>
<head>
    <title>Novell Services Login</title>
    <style>
         body {
            width: 400px;
            background-color: #f9f9f9;
            padding-left: 300px;
        }
        h2 {
            text-align: center;
        }
        input[type="text"], input[type="password"], select {
            width: 100%;
            padding: 10px;
            margin: 5px 0 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        input[type="radio"], input[type="checkbox"] {
            margin: 10px 5px 10px 0;
        }
        input[type="submit"],input[type="reset"] {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
        }
        input[type="reset"]{
            background-color: red;
        }
    </style> 
</head>
<body>
    <h2>Novell Services Login</h2>
    <form>
        Username:
        <input type="text" id="username" name="username"><br><br>

        Password:
        <input type="password" id="password" name="password"><br><br>

        <label for="city">City of Employment:</label>
        <input type="text" id="city" name="city"><br><br>

        <label for="webserver">Web Server:</label>
        <select id="webserver" name="webserver">
            <option value="server1">Server 1</option>
            <option value="server2">Server 2</option>
            </select><br><br>

        <label for="role">Please specify your role:</label>
        <br>
        <input type="radio" id="admin" name="role" value="Admin">admin
        <br>
        <input type="radio" id="engineer" name="role" value="Engineer">Engineer
        <br>
        <input type="radio" id="manager" name="role" value="Manager">manager
        <br>
        <input type="radio" id="guest" name="role" value="Guest">guest
        <br>
        <br>
        <label for="sso">Single Sign-on to the following:</label>
        <br>
        <input type="checkbox" id="payroll" value="Payroll">payroll
        <br>
        <input type="checkbox" id="selfservice" value="Self-Service">self-service
        <br>

        <input type="submit" value="Login">
        <br>
        <br>
        <input type="reset" value="reset">
    </form>
</body>
</html>
