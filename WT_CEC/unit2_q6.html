<!DOCTYPE html>
<html lang="en">
<head>
    <title>Time Table 2024</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        h1 {
            color: red;
            text-align: left;
            margin-top: 50px;
        }
        .container {
            margin-right: 250px;
        }
        table {
            border-collapse: collapse;
            background-color: #ccc;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #000;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #999;
        }
    </style>
</head>
<body>
    <h1>Time Table 2024</h1>
    <div class="container">
        <table>
            <tr>
                <th>Day</th>
                <th colspan="2">Schedule</th>
                <th>Topic</th>
            </tr>
            <tr>
                <td rowspan="2">Monday</td>
                <td>Begin</td>
                <td>End</td>
                <td>Introduction to XML</td>
            </tr>
            <tr>
                <td>8:00 a.m.</td>
                <td>5:00 p.m.</td>
                <td>Validity: DTD and Relax NG</td>
            </tr>
            <tr>
                <td rowspan="2">Tuesday</td>
                <td>8:00 a.m.</td>
                <td>11:00 a.m.</td>
                <td>XPath</td>
            </tr>
            <tr>
                <td>11:00 a.m.</td>
                <td>2:00 p.m.</td>
                <td>XSL Transformations</td>
            </tr>
            <tr>
                <td>Wednesday</td>
                <td>8:00 a.m.</td>
                <td>12:00 p.m.</td>
                <td>XSL Formatting Objects</td>
            </tr>
        </table>
    </div>
</body>
</html>
