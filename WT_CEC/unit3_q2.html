<!DOCTYPE html>
<html>
<head>
    <title>CSS Styling Example</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        h2 {
            color: green;
        }
        .internal-style {
            background-color: #e7e2e2;
            padding: 10px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Webpage</h1>
    </header>

    <main>
        <h2 class="internal-style">This is a Heading</h2>
        <p>This is a paragraph with an <span style="color: red;">inline styled</span> </p>
        <p>Here's another paragraph that uses the internal .</p>
    </main>

    <footer>
        <p>&copy; 2024 My Website.</p>
    </footer>

</body>
</html>
