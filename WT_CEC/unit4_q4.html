<!DOCTYPE html>
<html>

<head>
    <title>College Name Prompt</title>
</head>

<body>
    <script>

        let collegeName = prompt("Please enter your college name:");

        if (collegeName !== null) {

            document.write("Your college name is: " + collegeName);
        } else {
            
            document.write("Your college name is: null");
        }
    </script>
</body>

</html>
