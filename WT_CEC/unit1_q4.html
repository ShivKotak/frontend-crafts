<!DOCTYPE html>
<html>
<head>
    <title>unit 1-q4</title>
    <style>
        
        .navbar {
            background-color: #333;
            overflow: hidden;
        }

        .navbar a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px;
            text-decoration: none; 
        }

        .navbar a:hover {
            background-color: #575757; 
        }

        
        section {
            padding: 20px;
            margin: 20px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
        </div>

    <section id="home">
        <h1>Home</h1>
        <p>Welcome to the homepage! Here you will find the latest updates.</p>
    </section>

    <section id="about">
        <h1>About</h1>
        <p>This section contains information about our website.</p>
    </section>

    <section id="contact">
        <h1>Contact</h1>
        <p>Feel free to reach out through the contact form.</p>
    </section>

</body>
</html>
